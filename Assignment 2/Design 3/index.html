<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect - Pachyteria equestris</title>

    <!-- Remic Icon CDN -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

    <!-- External CSS File -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">INSECT</div>
            <div class="search-wrapper">
                <i class="ri-search-line"></i>
                <input type="text" placeholder="Search...">
            </div>
        </div>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <!-- Background Split -->
        <div class="split-bg">
            <div class="white-side"></div>
            <div class="red-side"></div>
        </div>

        <!-- Content Layer -->
        <div class="content-layer">
            <!-- Left Side -->
            <section class="left-section">
                <div class="classification-group">
                    <h1 class="vertical-title">Classification</h1>
                    <div class="classification-list">
                        <div class="list-item">
                            <span class="label">Class:</span>
                            <p class="value">Insecta</p>
                        </div>
                        <div class="list-item">
                            <span class="label">Order:</span>
                            <p class="value">Coleoptera</p>
                        </div>
                        <div class="list-item">
                            <span class="label">Family:</span>
                            <p class="value">Cerambycidae</p>
                        </div>
                        <div class="list-item">
                            <span class="label">Sub-Family:</span>
                            <p class="value">Cerambycinae</p>
                        </div>
                        <div class="list-item">
                            <span class="label">Tribe:</span>
                            <p class="value">Callicromatini</p>
                        </div>
                        <div class="list-item">
                            <span class="label">Genus:</span>
                            <p class="value">Pachyteria</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right Side -->
            <section class="right-section">
                <div class="product-info">
                    <h2 class="scientific-name">Pachyteria<br>equestris</h2>

                    <div class="specs-row">
                        <div class="beetle-outline-box">
                            <img src="./assets/bettle_outlines.png" alt="Outline">
                            <span>32 mm</span>
                        </div>
                        <div class="divider"></div>
                        <div class="text-specs">
                            <p><i class="ri-map-pin-2-fill"></i> <strong>Locality:</strong> Malaysia</p>
                            <p><i class="ri-men-line"></i> <strong>Sex:</strong> Male</p>
                            <p><i class="ri-ruler-line"></i><strong>Size:</strong> 32 mm / 12 mm</p>
                        </div>
                    </div>

                    <div class="price">$5.99</div>

                    <div class="toggles">
                        <label class="toggle-item">
                            <input type="checkbox"> <span class="custom-toggle"></span> View detailed antennae
                        </label>
                        <label class="toggle-item">
                            <input type="checkbox">
                            <span class="custom-toggle"></span> View underside
                        </label>
                    </div>

                    <button class="add-btn">Add to collection</button>
                </div>
            </section>
        </div>

        <!-- Center Jar (Floating) -->
        <div class="center-element">
            <img src="./assets/Bettle_inside_jar.png" alt="Beetle Jar" class="jar-image">
        </div>
    </main>

</body>

</html>
