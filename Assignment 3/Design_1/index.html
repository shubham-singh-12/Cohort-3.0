<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Art Work - NFT Gallery</title>

    <!-- Remix Icon CDM -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

    <!-- External CSS File -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">

        <!-- Header -->
        <header class="header">
            <h1 class="title">Explore Art Work</h1>
            <a href="#" class="see-all-link">See All</a>
        </header>

        <div class="gallery-grid">

            <!-- Card 1 -->
            <div class="nft-card">
                <div class="image-container">

                    <img src="./assets/image_1.png" alt="Monocular" class="nft-image">
                </div>
                <div class="card-info">
                    <div class="card-header">
                        <h3 class="nft-title">Monocular</h3>
                        <div class="price-like">
                            <span class="price">54.5k</span>
                            <button class="like-button">
                                <i class="ri-heart-line heart-icon"></i>
                            </button>
                        </div>
                    </div>
                    <button class="place-bid-button">Place Bid</button>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="nft-card">
                <div class="image-container">
                    <img src="./assets/image_2.png" alt="Horns Mask" class="nft-image">
                </div>
                <div class="card-info">
                    <div class="card-header">
                        <h3 class="nft-title">Horns Mask</h3>
                        <div class="price-like">
                            <span class="price">32.4k</span>
                            <button class="like-button">
                                <i class="ri-heart-line heart-icon"></i>
                            </button>
                        </div>
                    </div>
                    <button class="place-bid-button">Place Bid</button>
                </div>
            </div>

                    </div>

                </div>
            </div>

            <!-- Card 4 -->

                    <div class="card-header">
                        <h3 class="nft-title">Spiderman</h3>

                            <button class="like-button">
                                <i class="ri-heart-line heart-icon"></i>
                            </button>
                        </div>
                    </div>
                    <button class="place-bid-button">Place Bid</button>
                </div>
            </div>

            <!-- Card 6 -->

                    <div class="card-header">
                        <h3 class="nft-title">White Eye</h3>
                        <div class="price-like">
                            <span class="price">45.7k</span>
